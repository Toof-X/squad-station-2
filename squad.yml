project: squad-station
orchestrator:
  provider: claude-code
  role: orchestrator
  model: opus
  description: "Routes tasks between agents and synthesizes results"
agents:
  - name: implement
    provider: claude-code
    role: worker
    model: sonnet
    description: "Implements features and fixes bugs"
  - name: review
    provider: gemini-cli
    role: worker
    description: "Reviews code and provides feedback"
